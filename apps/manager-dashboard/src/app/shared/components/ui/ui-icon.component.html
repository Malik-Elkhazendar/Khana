<svg
  class="ui-icon"
  [attr.width]="size"
  [attr.height]="size"
  viewBox="0 0 24 24"
  fill="none"
  stroke="currentColor"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
  [attr.aria-hidden]="ariaHidden"
  [attr.role]="ariaHidden ? null : 'img'"
>
  <ng-container [ngSwitch]="name">
    <ng-container *ngSwitchCase="'bookings'">
      <rect x="4" y="5" width="16" height="14" rx="2"></rect>
      <line x1="8" y1="9" x2="16" y2="9"></line>
      <line x1="8" y1="13" x2="16" y2="13"></line>
      <line x1="8" y1="17" x2="13" y2="17"></line>
    </ng-container>

    <ng-container *ngSwitchCase="'calendar'">
      <rect x="3" y="4" width="18" height="17" rx="2"></rect>
      <line x1="16" y1="2" x2="16" y2="6"></line>
      <line x1="8" y1="2" x2="8" y2="6"></line>
      <line x1="3" y1="10" x2="21" y2="10"></line>
    </ng-container>

    <ng-container *ngSwitchCase="'new'">
      <circle cx="12" cy="12" r="9"></circle>
      <line x1="12" y1="8" x2="12" y2="16"></line>
      <line x1="8" y1="12" x2="16" y2="12"></line>
    </ng-container>

    <ng-container *ngSwitchCase="'facilities'">
      <rect x="3" y="5" width="7" height="14" rx="1"></rect>
      <rect x="14" y="5" width="7" height="14" rx="1"></rect>
      <line x1="6.5" y1="9" x2="6.5" y2="9"></line>
      <line x1="17.5" y1="9" x2="17.5" y2="9"></line>
    </ng-container>

    <ng-container *ngSwitchCase="'promo'">
      <path d="M20 12.5 12.5 20 4 11.5V4h7.5L20 12.5Z"></path>
      <circle cx="8.5" cy="8.5" r="1.2"></circle>
      <line x1="10.5" y1="10.5" x2="15.5" y2="15.5"></line>
    </ng-container>

    <ng-container *ngSwitchCase="'team'">
      <circle cx="9" cy="9" r="3"></circle>
      <circle cx="17" cy="10" r="2.5"></circle>
      <path d="M3 19c0-2.8 2.7-5 6-5s6 2.2 6 5"></path>
      <path d="M13 19c0-2 1.8-3.5 4-3.5s4 1.5 4 3.5"></path>
    </ng-container>

    <ng-container *ngSwitchCase="'settings'">
      <circle cx="12" cy="12" r="3"></circle>
      <path
        d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1 0 2.8l-.1.1a2 2 0 0 1-2.8 0l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 0 1-2 2h-.2a2 2 0 0 1-2-2v-.2a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8 0l-.1-.1a2 2 0 0 1 0-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1-2-2v-.2a2 2 0 0 1 2-2h.2a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 0-2.8l.1-.1a2 2 0 0 1 2.8 0l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.6V3a2 2 0 0 1 2-2h.2a2 2 0 0 1 2 2v.2a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 0l.1.1a2 2 0 0 1 0 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c0 .7.4 1.4 1.1 1.6H21a2 2 0 0 1 2 2v.2a2 2 0 0 1-2 2h-.2a1.7 1.7 0 0 0-1.4 1.2z"
      ></path>
    </ng-container>
  </ng-container>
</svg>
