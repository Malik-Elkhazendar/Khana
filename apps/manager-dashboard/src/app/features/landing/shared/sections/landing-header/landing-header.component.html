<header class="landing-header" [class.scrolled]="isScrolled()" role="banner">
  <div class="header-container">
    <a
      [routerLink]="homeRoute()"
      class="logo"
      [attr.aria-label]="content().logoAriaLabel"
    >
      <span class="logo-mark">
        <svg
          viewBox="0 0 32 32"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M16 0L18.5 13.5L32 16L18.5 18.5L16 32L13.5 18.5L0 16L13.5 13.5L16 0Z"
            fill="currentColor"
          />
        </svg>
      </span>
      <span class="logo-text">Khana</span>
      <span class="logo-arabic">خانة</span>
    </a>

    <nav class="nav-desktop" [attr.aria-label]="content().navAriaLabel">
      <ul class="nav-list" role="list">
        @for (item of content().navItems; track item.sectionId) {
        <li>
          <button
            type="button"
            class="nav-link"
            (click)="navigateToSection.emit(item.sectionId)"
            [attr.aria-label]="navItemAriaLabel(item.label)"
          >
            {{ item.label }}
          </button>
        </li>
        }
      </ul>
    </nav>

    <div class="header-actions">
      <a
        routerLink="/login"
        class="btn btn-ghost"
        [attr.aria-label]="content().loginAriaLabel"
      >
        {{ content().loginLabel }}
      </a>
      <a
        routerLink="/register"
        class="btn btn-primary"
        [attr.aria-label]="content().primaryActionAriaLabel"
      >
        <span class="btn-text">{{ content().primaryActionLabel }}</span>
        <span class="btn-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path
              fill-rule="evenodd"
              d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
              clip-rule="evenodd"
            />
          </svg>
        </span>
      </a>
      <app-language-switcher
        class="landing-language-switcher"
        [tone]="isScrolled() ? 'dark' : 'light'"
        [useShortLabel]="true"
      ></app-language-switcher>
    </div>

    <button
      type="button"
      class="mobile-menu-btn"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-controls="mobile-menu"
      [attr.aria-label]="content().mobileMenuToggleLabel"
    >
      <span class="hamburger" [class.open]="mobileMenuOpen()">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>

  <nav
    id="mobile-menu"
    class="nav-mobile"
    [class.open]="mobileMenuOpen()"
    [attr.aria-hidden]="!mobileMenuOpen()"
    [attr.aria-label]="content().mobileNavAriaLabel"
  >
    <ul class="mobile-nav-list" role="list">
      @for (item of content().navItems; track item.sectionId) {
      <li>
        <button
          type="button"
          class="mobile-nav-link"
          (click)="onMobileNavClick(item.sectionId)"
          [attr.aria-label]="navItemAriaLabel(item.label)"
        >
          {{ item.label }}
        </button>
      </li>
      }
      <li class="mobile-cta">
        <a
          routerLink="/register"
          class="btn btn-primary btn-block"
          (click)="mobileMenuOpen.set(false)"
        >
          {{ content().primaryActionLabel }}
        </a>
      </li>
      <li class="mobile-cta">
        <app-language-switcher
          class="landing-language-switcher landing-language-switcher--mobile"
          [fullWidth]="true"
        ></app-language-switcher>
      </li>
    </ul>
  </nav>
</header>
